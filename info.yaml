# Tiny Tapeout project information
project:
  title:      "PQC NTT Butterfly Unit"
  author:     "Aishwarya and Rishika"
  discord:    ""
  description: "Hardware implementation of a Cooley-Tukey NTT Butterfly core for PQC."
  language:    "Verilog"
  clock_hz:    0
  tiles:       "1x1"
  top_module:  "tt_um_pqc_aishu"

# List your project's source files here.
source_files:
  - "project.v"
  - "butterfly_unit.v"
  - "montgomery_red.v"

# The pinout of your project.
pinout:
  # Inputs
  ui[0]: "input_b[0]"
  ui[1]: "input_b[1]"
  ui[2]: "input_b[2]"
  ui[3]: "input_b[3]"
  ui[4]: "input_a[0]"
  ui[5]: "input_a[1]"
  ui[6]: "input_a[2]"
  ui[7]: "input_a[3]"

  # Outputs
  uo[0]: "out_a[0]"
  uo[1]: "out_a[1]"
  uo[2]: "out_a[2]"
  uo[3]: "out_a[3]"
  uo[4]: "out_a[4]"
  uo[5]: "out_a[5]"
  uo[6]: "out_a[6]"
  uo[7]: "out_a[7]"

  # Bidirectional pins (unused)
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Descriptions
  how_it_works: "Performs NTT butterfly addition and Montgomery reduction on 4-bit input nibbles."
  how_to_test:  "Set ui[7:4] as A and ui[3:0] as B. Result of (A + B*omega) appears on uo_out."

# Do not change!
yaml_version: 6
