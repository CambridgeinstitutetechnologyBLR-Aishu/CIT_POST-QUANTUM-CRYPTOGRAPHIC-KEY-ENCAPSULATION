# Tiny Tapeout project information
project:
  title:      "8-bit PQC NTT Accelerator"
  author:     "Aishwarya and Rishika"
  discord:    ""
  description: "Hardware implementation of Kyber-768 NTT core for V2X security"
  language:    "Verilog"
  clock_hz:    0
  tiles:       "1x1"
  top_module:  "tt_um_pqc_aishu"

# List your project's source files here.
source_files:
  - "project.v"
  - "pqc_top.v"
  - "pqc_controller.v"
  - "butterfly_unit.v"
  - "montgomery_red.v"

# The pinout of your project.
pinout:
  # Inputs
  ui[0]: "data_in[0]"
  ui[1]: "data_in[1]"
  ui[2]: "data_in[2]"
  ui[3]: "data_in[3]"
  ui[4]: "data_in[4]"
  ui[5]: "data_in[5]"
  ui[6]: "data_in[6]"
  ui[7]: "start_signal"

  # Outputs
  uo[0]: "data_out[0]"
  uo[1]: "data_out[1]"
  uo[2]: "data_out[2]"
  uo[3]: "data_out[3]"
  uo[4]: "data_out[4]"
  uo[5]: "data_out[5]"
  uo[6]: "data_out[6]"
  uo[7]: "data_out[7]"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Descriptions
  how_it_works: "Sequentially loads 8-bit data into a 16-bit internal Montgomery NTT core."
  how_to_test:  "Apply 8-bit data chunks via ui_in and check uo_out for the result."

# Do not change!
yaml_version: 6
